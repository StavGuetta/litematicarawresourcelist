<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Material Calculator</title>
    <!-- Poppins Font Import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-color: #1e1e1e; 
            --panel-color: #2c2c2c; 
            --accent-color: #3b8526; 
            --text-color: #ffffff; 
            --border-color: #444; 
            --hover-color: rgba(255,255,255,0.1);
            --input-bg: #111;
            
            /* Dark Mode Specifics */
            --header-bg: rgba(255, 255, 255, 0.02);
            --card-bg: rgba(255, 255, 255, 0.05);
            --cat-header-bg: rgba(255, 255, 255, 0.03);
            --sort-bg: rgba(255, 255, 255, 0.02);
        }
        
        body.light-mode {
            --bg-color: #f0f2f5;
            --panel-color: #ffffff;
            --text-color: #333333;
            --border-color: #ccc;
            --hover-color: rgba(0,0,0,0.05);
            --input-bg: #fff;
            
            /* Light Mode equivalents */
            --header-bg: rgba(0, 0, 0, 0.05);
            --card-bg: #ffffff;
            --cat-header-bg: rgba(0, 0, 0, 0.03);
            --sort-bg: rgba(0, 0, 0, 0.05);
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        
        /* --- SEARCH AREA (Top Bar) --- */
        #search-area {
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%; /* Full width */
            background-color: var(--bg-color);
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Spread Left/Center/Right */
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            border-radius: 0 0 8px 8px;
            transition: background-color 0.3s;
        }

        .search-left {
            display: flex;
            align-items: center; /* Side by side */
            gap: 20px;
            min-width: 200px;
        }

        #item-counter { 
            font-family: 'Poppins', monospace; 
            color: #aaa; 
            font-size: 1.1em; 
            white-space: nowrap;
            font-weight: 500;
        }
        
        #schematic-title {
            font-size: 1.2em; /* Slightly larger */
            color: var(--accent-color);
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 400px;
        }

        .search-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-grow: 1;
            flex-wrap: wrap;
        }

        #search-input-wrapper {
            position: relative;
            width: 300px;
        }

        #item-search-input {
            width: 100%;
            padding: 10px 40px 10px 20px;
            border-radius: 6px; 
            border: 1px solid var(--border-color);
            background-color: var(--panel-color);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            font-size: 1.1em;
            box-sizing: border-box;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            transition: border-color 0.2s, background-color 0.3s;
            height: 42px;
        }
        
        #item-search-input:focus { outline: none; border-color: var(--accent-color); }

        #clear-search-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            color: #888; cursor: pointer; font-size: 1.1em; font-weight: bold;
            display: none; width: 20px; height: 20px; line-height: 20px; text-align: center; border-radius: 50%;
        }
        #clear-search-btn:hover { color: var(--text-color); background-color: var(--hover-color); }

        /* Control Buttons */
        .action-btn {
            padding: 0 15px; 
            height: 42px;
            text-align: center;
            border-radius: 6px; 
            border: 1px solid var(--border-color);
            background-color: var(--panel-color);
            color: #aaa;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.95em;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center;
        }

        .action-btn:hover {
            background-color: var(--hover-color);
            color: var(--text-color);
            transform: translateY(-1px);
        }

        .action-btn:active { transform: translateY(0); }
        
        .action-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        
        #clear-inputs-btn:hover { background-color: #c0392b; color: white; border-color: #e74c3c; }
        
        #litematic-btn { background-color: #2980b9; color: white; border-color: #3498db; }
        #litematic-btn:hover { background-color: #3498db; }

        /* --- HAMBURGER MENU --- */
        .search-right {
            display: flex;
            justify-content: flex-end;
            min-width: 50px;
        }

        .menu-container {
            position: relative;
        }
        
        #menu-btn {
            font-size: 1.2em;
            padding: 0 15px;
        }

        #menu-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            width: 220px;
            overflow: hidden;
            z-index: 1000;
        }
        
        #menu-dropdown.show { display: flex; }

        .menu-item {
            padding: 12px 15px;
            color: var(--text-color);
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .menu-item:hover { background-color: var(--hover-color); }
        .menu-item:last-child { border-bottom: none; }
        
        /* Toggle Switch in Menu */
        .toggle-switch {
            position: relative; width: 36px; height: 20px;
            pointer-events: none; 
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* --- UNIT CONTROLS --- */
        #unit-controls {
            width: calc(100% - 40px);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        #unit-label {
            color: #aaa; font-weight: 500; margin-right: 10px; white-space: nowrap;
        }

        .unit-btn {
            padding: 6px 12px;
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #aaa;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .unit-btn:hover { background-color: var(--hover-color); color: var(--text-color); }
        .unit-btn.active { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }

        /* --- PANELS --- */
        .panel, #inventory-wrapper {
            background-color: var(--panel-color);
            width: calc(100% - 40px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
            transition: all 0.3s ease;
            overflow: hidden; 
        }

        /* Inventory specific adjustments */
        #inventory-wrapper {
            text-align: center;
            padding: 5px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background-color: var(--header-bg); 
            border-bottom: 1px solid var(--border-color);
            user-select: none;
            cursor: pointer; 
        }
        
        /* Title Group (Left side) */
        .panel-title-group {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* Controls Group (Right side) */
        .panel-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Collapse Button */
        .collapse-btn {
            background: none; border: none; color: #888;
            font-size: 0.9em; cursor: pointer; padding: 5px;
            width: 24px; height: 24px; display: flex; justify-content: center; align-items: center;
            transition: transform 0.2s;
            pointer-events: none; 
        }
        .panel-header:hover .collapse-btn { color: var(--text-color); }
        
        .collapsed .collapse-btn { transform: rotate(-90deg); }
        .collapsed .panel-content { display: none; }
        .collapsed #inventory-grid { display: none; }
        .collapsed { padding-bottom: 0 !important; border-bottom: 1px solid transparent; }

        /* Sort Dropdown */
        .sort-select {
            background-color: var(--sort-bg); 
            color: #ccc;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.2em; 
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }
        .sort-select option { background-color: var(--panel-color); }
        .sort-select:hover { background-color: var(--panel-color); color: var(--text-color); border-color: #888; }

        /* --- CHECKBOXES --- */
        .select-all-container {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #bbb;
            text-transform: none;
            font-weight: 500;
            font-size: 1.2em; 
        }
        .select-all-container input { display: none; }
        .custom-check {
            width: 18px; height: 18px; border: 2px solid #555; border-radius: 4px;
            margin-right: 8px; display: flex; align-items: center; justify-content: center;
            background-color: rgba(0,0,0,0.2); transition: all 0.2s; color: white; font-weight: bold; font-size: 12px;
            flex-shrink: 0;
        }
        .select-all-container:hover .custom-check { border-color: #888; }
        .select-all-container input:checked + .custom-check { background-color: #4cd137; border-color: #4cd137; }
        .select-all-container input:checked + .custom-check::before { content: '✔'; }

        /* --- INVENTORY GRID --- */
        #inventory-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            padding-top: 10px;
        }

        /* ITEM BUTTONS */
        .item-btn {
            width: 36px; height: 36px;
            background-color: rgba(0,0,0,0.2);
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: text;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.1s;
            position: relative;
        }
        .item-btn:hover { background-color: var(--hover-color); border-color: #888; transform: scale(1.1); z-index: 10; }
        .item-btn.active { border-color: var(--accent-color); background-color: rgba(59, 133, 38, 0.2); }
        .item-btn img { width: 32px; height: 32px; image-rendering: pixelated; object-fit: contain; pointer-events: none; }
        
        .qty-input {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none; background: transparent; color: white; font-weight: bold; text-align: center;
            font-size: 14px; text-shadow: 0 0 2px black; padding: 0; margin: 0;
            opacity: 0; border-radius: 6px; cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }
        .qty-input:focus { opacity: 1; background-color: rgba(0,0,0,0.8); outline: none; cursor: text; }
        .item-btn.active .qty-input { opacity: 1; background-color: rgba(0,0,0,0.5); }
        .qty-input::-webkit-outer-spin-button, .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .qty-input { -moz-appearance: textfield; }

        /* --- RESULTS GRID --- */
        .panel-content { padding: 20px; }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 10px; padding: 20px; margin: 0; list-style: none; 
        }

        .raw-grid {
             display: grid;
             grid-template-columns: repeat(auto-fill, minmax(30%, 1fr));
             gap: 10px; padding: 20px; margin: 0; list-style: none;
        }

        /* Steps Grid Base */
        .steps-grid {
            display: grid;
            gap: 10px; padding: 10px; margin: 0; list-style: none; 
        }
        /* Steps Grid Layouts (Strict Columns) */
        .steps-grid.cols-1 { grid-template-columns: 1fr; }
        .steps-grid.cols-2 { grid-template-columns: repeat(2, 1fr); } 
        .steps-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
        
        /* Mobile Fallback */
        @media (max-width: 768px) {
            .steps-grid.cols-2, .steps-grid.cols-3 { grid-template-columns: 1fr; }
        }

        /* Result Card Item */
        .result-card {
            background-color: var(--card-bg); 
            border-radius: 6px; padding: 10px;
            display: flex; align-items: center; justify-content: space-between;
            border-left: 4px solid var(--accent-color);
            cursor: pointer; transition: background 0.15s, transform 0.1s;
            user-select: none; gap: 15px;
        }

        .result-card:hover { background-color: rgba(255,255,255,0.1); }
        .result-card:active { transform: scale(0.98); }

        .result-card.done { background-color: rgba(0,0,0,0.1); border-left-color: #777 !important; }
        .result-card.done .item-info, .result-card.done .item-qty { opacity: 0.4; filter: grayscale(100%); }

        .check-indicator {
            width: 24px; height: 24px; border: 2px solid #555; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            transition: all 0.2s; color: transparent; font-weight: bold; font-size: 16px;
            background-color: rgba(0,0,0,0.3);
        }
        .result-card:hover .check-indicator { border-color: #888; }
        .result-card.done .check-indicator { background-color: #4cd137; border-color: #4cd137; color: white; }
        .result-card.done .check-indicator::before { content: '✔'; }
        
        .item-info { display: flex; align-items: center; gap: 15px; overflow: hidden; flex-grow: 1; }
        .item-name { 
            font-weight: 500; 
            font-size: 1em; 
            white-space: normal; 
            word-break: break-word;
            line-height: 1.4;
        }
        .item-qty { font-family: 'Poppins', monospace; font-size: 1.0em; font-weight: bold; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 4px; white-space: nowrap; }
        .result-icon { width: 32px; height: 32px; image-rendering: pixelated; object-fit: contain; flex-shrink: 0; }
        
        .instruction-item {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
            color: #fff;
            margin-inline: 8px;
            display: inline-flex;
            align-items: center;
        }
        
        .inline-icon {
            width: 1.2em; height: 1.2em;
            margin-left: 5px;
            vertical-align: text-bottom;
            image-rendering: pixelated;
        }
        
        body.light-mode .instruction-item {
            background-color: rgba(0,0,0,0.1);
            color: #333;
        }
        
        .unit-breakdown {
            font-size: 0.85em;
            color: #888;
        }

        /* --- CRAFTING CATEGORIES --- */
        .category-block {
            background-color: rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
            transition: max-height 0.3s;
        }

        .category-header {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 15px; background-color: var(--cat-header-bg); 
            border-bottom: 1px solid var(--border-color);
            cursor: pointer; 
        }
        .category-header:hover { background-color: rgba(255,255,255,0.08); }

        .category-title {
            color: #4cd137; font-weight: bold; font-size: 1em; text-transform: uppercase; letter-spacing: 1px;
            pointer-events: none;
        }
        
        .header-line { flex-grow: 1; height: 1px; background: var(--border-color); margin: 0 10px; }
        
        .group-total { color: #aaa; font-family: 'Poppins', monospace; font-size: 1.1em; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
        
        .category-content { padding: 10px; }
        
        .category-block.collapsed .category-content { display: none; }
        .category-block.collapsed .category-header { border-bottom: none; }
        .category-block.collapsed .collapse-btn { transform: rotate(-90deg); }

        /* --- CUSTOM MODALS & TOASTS --- */
        #custom-tooltip {
            position: fixed; background-color: rgba(20, 20, 20, 0.95);
            color: white; padding: 6px 12px; border-radius: 4px; border: 1px solid #555;
            font-size: 0.9rem; pointer-events: none; display: none; z-index: 10000;
            white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(2px);
            display: none; align-items: center; justify-content: center;
            z-index: 2000;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: var(--panel-color); border: 1px solid var(--border-color);
            padding: 20px; border-radius: 8px; max-width: 400px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); color: var(--text-color);
        }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }

        #toast-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 20px; border-radius: 6px;
            border: 1px solid #555; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 3000; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        #toast-container.show { opacity: 1; }

        .debug-source { display: none; font-size: 0.85em; color: #888; margin-top: 4px; width: 100%; white-space: normal; }
        body.show-usage .debug-source { display: block; }
    </style>
</head>
<body>
    
    <!-- Top Bar: Search & Controls -->
    <div id="search-area">
        <div class="search-left">
            <span id="schematic-title"></span>
            <span id="item-counter">Items: 0</span>
        </div>
        
        <div class="search-center">
            <div id="search-input-wrapper">
                <input type="text" id="item-search-input" placeholder="Search items..." oninput="applyFilters()">
                <div id="clear-search-btn" onclick="clearSearch()">✕</div>
            </div>
            <!-- Controls -->
            <input type="file" id="litematic-input" accept=".litematic,.txt" style="display: none;">
            <button id="litematic-btn" class="action-btn" onclick="document.getElementById('litematic-input').click()">Import List</button>
            
            <button id="hide-unused-btn" class="action-btn" onclick="toggleHideUnused()">Hide Unused</button>
            <button id="clear-inputs-btn" class="action-btn" onclick="resetAll()">Clear Inputs</button>
        </div>

        <div class="search-right">
            <!-- Hamburger Menu -->
            <div class="menu-container">
                <button id="menu-btn" class="action-btn" onclick="toggleMenu()">☰</button>
                <div id="menu-dropdown">
                    <div class="menu-item" onclick="toggleShowAll()">
                        <span>Show All Items</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="show-all-check">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="menu-item" onclick="toggleUsage()">
                        <span>Show Usage</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="show-usage-check">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="menu-item" onclick="toggleTheme()">
                        <span>Dark Mode</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="theme-check" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="menu-item" onclick="restoreDefaults()" style="color: #e74c3c;">
                        Restore Defaults
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Custom Tooltip Container -->
    <div id="custom-tooltip"></div>
    
    <!-- Confirm Modal -->
    <div id="confirmation-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Reset Calculator?</h3>
            <p>This will clear all selected items, settings, and progress. This action cannot be undone.</p>
            <div class="modal-buttons">
                <button class="action-btn" onclick="closeModal()">Cancel</button>
                <button class="action-btn" style="border-color: #e74c3c; color: #e74c3c;" onclick="confirmReset()">Reset</button>
            </div>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast-container"></div>

    <!-- Inventory Grid -->
    <div class="panel" id="inventory-wrapper">
        <div class="panel-header" onclick="togglePanel('inventory-wrapper', event)">
            <div class="panel-title-group">
                <button class="collapse-btn">▼</button>

        let itemsMap = {};

        let selectedItems = {}; 
        let hideUnusedMode = false;

        let showUsageMode = false;
        let darkMode = true;
        
        let doneMaterials = new Set();

        let stepsGridColumns = 2; // Default 2

        function init() {
            const container = document.getElementById('inventory-grid');
            container.innerHTML = ''; 
            itemsMap = {};
            displayToKeyMap = {}; 

            itemsArray.forEach(item => {
                itemsMap[item.name] = item;
                const dName = item.displayName || item.name.replace('minecraft:', '').replace(/_/g, ' ').replace(/\b\w/g, l=>l.toUpperCase());
                displayToKeyMap[dName.toLowerCase()] = item.name;

                if (pathMap[item.name]) {
                    const btn = document.createElement('div');
                    btn.className = 'item-btn';
                    btn.id = `btn-${item.name}`; 
                    btn.dataset.survival = item.survivalFriendly ? "true" : "false";
                    btn.dataset.search = dName.toLowerCase();
                    
                    btn.addEventListener('mouseenter', () => showTooltip(dName));
                    btn.addEventListener('mousemove', (e) => moveTooltip(e));
                    btn.addEventListener('mouseleave', hideTooltip);
                    
                    const img = document.createElement('img');
                    img.src = pathMap[item.name];
                    img.loading = "lazy"; 
                    btn.appendChild(img);

                    const input = document.createElement('input');
                    input.type = 'number';
                    input.className = 'qty-input';
                    input.min = 0;
                    input.placeholder = ""; 
                    
                    input.onchange = (e) => handleQuantityChange(item.name, e.target.value, btn);
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') input.blur();
                    });
                    
                    btn.onclick = () => input.focus();
                    btn.appendChild(input);
                    container.appendChild(btn);
                }
            });
            
            calculateDepths();
            loadState();
        }

        // --- LOCAL STORAGE & RESTORE ---
        function saveState() {
            const state = {
                selectedItems: selectedItems,
                doneMaterials: Array.from(doneMaterials),
                doneSteps: Array.from(doneSteps),
                hideUnusedMode: hideUnusedMode,
                currentUnit: currentUnit,
                rawSortOrder: rawSortOrder,
                stepSortOrder: stepSortOrder,
                showAllItemsMode: showAllItemsMode,
                showUsageMode: showUsageMode,
                darkMode: darkMode,
                collapsedSections: Array.from(collapsedSections),
                stepsGridColumns: stepsGridColumns 
            };
            localStorage.setItem('mc_calc_state', JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem('mc_calc_state');
            if (saved) {
                try {
                    const state = JSON.parse(saved);
                    if(state.selectedItems) selectedItems = state.selectedItems;
                    if(state.doneMaterials) doneMaterials = new Set(state.doneMaterials);
                    if(state.doneSteps) doneSteps = new Set(state.doneSteps);
                    if(state.hideUnusedMode !== undefined) hideUnusedMode = state.hideUnusedMode;
                    if(state.currentUnit) currentUnit = state.currentUnit;
                    if(state.rawSortOrder) rawSortOrder = state.rawSortOrder;
                    if(state.stepSortOrder) stepSortOrder = state.stepSortOrder;
                    if(state.showAllItemsMode !== undefined) showAllItemsMode = state.showAllItemsMode;
                    if(state.showUsageMode !== undefined) showUsageMode = state.showUsageMode;
                    if(state.darkMode !== undefined) darkMode = state.darkMode;
                    if(state.collapsedSections) collapsedSections = new Set(state.collapsedSections);
                    if(state.stepsGridColumns !== undefined) stepsGridColumns = state.stepsGridColumns;
                } catch (e) { console.error("Load state error", e); }
            }
            updateUIState();
            recalculateAll();
            applyFilters();
        }

        function updateUIState() {
            const unusedBtn = document.getElementById('hide-unused-btn');
            if(hideUnusedMode) { unusedBtn.textContent = "Show Unused"; unusedBtn.classList.add('active'); }
            else { unusedBtn.textContent = "Hide Unused"; unusedBtn.classList.remove('active'); }

            document.getElementById('theme-check').checked = darkMode;
            if(!darkMode) document.body.classList.add('light-mode');
            else document.body.classList.remove('light-mode');

            document.getElementById('show-all-check').checked = showAllItemsMode;
            
            document.getElementById('show-usage-check').checked = showUsageMode;
            if(showUsageMode) document.body.classList.add('show-usage');
            else document.body.classList.remove('show-usage');

            document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
            const unitBtn = document.getElementById(`btn-${currentUnit}`);
            if(unitBtn) unitBtn.classList.add('active');

            document.getElementById('raw-sort-select').value = rawSortOrder;
            document.getElementById('steps-sort-select').value = stepSortOrder;

            for (const [key, qty] of Object.entries(selectedItems)) {
                const btn = document.getElementById(`btn-${key}`);
                if (btn) {
                    btn.classList.add('active');
                    const input = btn.querySelector('input');
                    if(input) input.value = qty;
                }
            }
            
            collapsedSections.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('collapsed');
            });
            
            document.getElementById('grid-toggle-btn').textContent = (stepsGridColumns === 1) ? '☰' : (stepsGridColumns === 2) ? '⊞' : '▦';
        }
        
        function restoreDefaults() {
            document.getElementById('confirmation-modal').classList.add('show');
            // Hide menu
            document.getElementById('menu-dropdown').classList.remove('show');
        }

        function closeModal() {
            document.getElementById('confirmation-modal').classList.remove('show');
        }

        function confirmReset() {
            localStorage.removeItem('mc_calc_state');
            location.reload();
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast-container');
            toast.textContent = message;
            toast.style.borderColor = isError ? '#e74c3c' : '#4cd137';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // --- MENU LOGIC ---
        function toggleMenu() {
            document.getElementById('menu-dropdown').classList.toggle('show');
        }
        window.addEventListener('click', function(e) {
            if (!document.getElementById('menu-dropdown').contains(e.target) && !document.getElementById('menu-btn').contains(e.target)) {
                document.getElementById('menu-dropdown').classList.remove('show');
            }
            const modal = document.getElementById('confirmation-modal');
            if (e.target === modal) closeModal();
        });

        function toggleTheme() {
            darkMode = !darkMode;
            updateUIState();
            saveState();
        }
        
        function toggleShowAll() {
            showAllItemsMode = !showAllItemsMode;
            updateUIState();
            saveState();
            applyFilters();
        }

        function toggleUsage() {
            showUsageMode = !showUsageMode;
            updateUIState();
            saveState();
        }

        function calculateDepths() {
            const getDepth = (name, path=new Set()) => {
                if (itemDepth[name] !== undefined) return itemDepth[name];
                if (path.has(name)) return 0; 
                
                const item = itemsMap[name];
                if (!item || !item.ingredients || item.ingredients.length === 0 || item.natural || !item.hasRecipe || name.startsWith('#') || name === 'fuel') {
                    itemDepth[name] = 0;
                    return 0;
                }
                
                path.add(name);
                let maxIngDepth = 0;
                item.ingredients.forEach(ing => {
                    if (ing === 'fuel') maxIngDepth = Math.max(maxIngDepth, 0); 
                    else maxIngDepth = Math.max(maxIngDepth, getDepth(ing, path));
                });
                path.delete(name);
                itemDepth[name] = maxIngDepth + 1;
                return maxIngDepth + 1;
            };
            for (let name in itemsMap) getDepth(name);
        }

        // --- Logic ---
        function togglePanel(id, e) {
            if(e && (e.target.tagName === 'INPUT' || e.target.tagName === 'LABEL' || e.target.tagName === 'SELECT' || e.target.tagName === 'BUTTON')) return;
            const el = document.getElementById(id);
            el.classList.toggle('collapsed');
            
            if (el.classList.contains('collapsed')) collapsedSections.add(id);
            else collapsedSections.delete(id);
            saveState();
        }

        function toggleCategory(id, e) {
            if(e && (e.target.tagName === 'INPUT' || e.target.tagName === 'LABEL' || e.target.tagName === 'BUTTON')) return;
            const el = document.getElementById(id);
            el.classList.toggle('collapsed');
            if (el.classList.contains('collapsed')) collapsedSections.add(id);
            else collapsedSections.delete(id);
            saveState();
        }
        
        function cycleStepsGrid() {
            stepsGridColumns++;
            if (stepsGridColumns > 3) stepsGridColumns = 1;
            updateUIState(); 
            saveState();
            recalculateAll(); 
        }

        function updateSort(type, value) {
            if (type === 'material') rawSortOrder = value;
            else stepSortOrder = value;
            saveState();
            recalculateAll();
        }

        function sortItems(aKey, bKey, amounts, doneSet, mode) {
            const aDone = doneSet.has(aKey);
            const bDone = doneSet.has(bKey);
            
            if (aDone !== bDone) return aDone ? 1 : -1;
            
            const aAmt = amounts[aKey].amount;
            const bAmt = amounts[bKey].amount;
            
            if (mode === 'count-desc') {
                if (aAmt !== bAmt) return bAmt - aAmt;
            } else if (mode === 'count-asc') {
                if (aAmt !== bAmt) return aAmt - bAmt;
            } else if (mode === 'name-asc') {
                return aKey.localeCompare(bKey);
            } else if (mode === 'name-desc') {
                return bKey.localeCompare(aKey);
            } else if (mode === 'smart') {
                 // FIX: Restored Depth Sorting for Smart mode
                 const d1 = itemDepth[aKey] || 0;
                 const d2 = itemDepth[bKey] || 0;
                 if (d1 !== d2) return d1 - d2;

                 const getName = (k) => {
                     const i = itemsMap[k];
                     if (i && i.displayName) return i.displayName;
                     return k.replace('minecraft:', '').replace(/_/g, ' ').replace(/\b\w/g, l=>l.toUpperCase());
                 };
                 const nA = getName(aKey);
                 const nB = getName(bKey);
                 
                 const gA = nA.split(' ')[0];
                 const gB = nB.split(' ')[0];
                 if (gA !== gB) return gA.localeCompare(gB);
                 
                 if (aAmt !== bAmt) return bAmt - aAmt;
                 return nA.localeCompare(nB);
            }
            return aKey.localeCompare(bKey);
        }

        function normalizeMethod(m) {
            if (!m) return "Crafting Table";
            const lower = m.toLowerCase();
            if (lower.includes("crafting")) return "Crafting Table";
            if (lower.includes("smelting") || lower.includes("furnace") || lower.includes("blast") || lower.includes("smoking") || lower.includes("campfire")) return "Furnace / Smelter";
            if (lower.includes("stonecut")) return "Stonecutter";
            if (lower.includes("right click")) return "Interaction";
            if (lower.includes("water")) return "Water Interaction"; 
            return "Other";
        }

        function toggleSelectAllCategory(method, checkbox) {
            let grandSteps = {};
            for (const [key, qty] of Object.entries(selectedItems)) {
                getRawMaterials(key, qty, {}, grandSteps, new Set(), "Direct Input");
            }
            
            const itemsInGroup = [];
            for (const [key, data] of Object.entries(grandSteps)) {
                if (normalizeMethod(data.method) === method) itemsInGroup.push(key);
            }
            
            const isChecking = checkbox.checked;
            itemsInGroup.forEach(k => {
                if (isChecking) doneSteps.add(k);

            });

        function setUnit(unit) {

        function formatAmount(amount, itemKey) {
            const totalStr = amount.toLocaleString();
            if (currentUnit === 'single') return totalStr;

            let stackSize = 64;
            if (itemKey && itemsMap[itemKey] && itemsMap[itemKey].stackSize) {
                stackSize = itemsMap[itemKey].stackSize;
            }

            if (stackSize === 1) return totalStr; 

            let remainder = amount;
            let parts = [];
            const ST = stackSize;
            const SB = ST * 27;
            const DC = ST * 54;
            
            if (currentUnit === 'dc') {
                const dcCount = Math.floor(remainder / DC);
                if (dcCount > 0) { parts.push(dcCount + " Double Chests"); remainder %= DC; }
            }
            if (currentUnit === 'dc' || currentUnit === 'sb') {
                const sbCount = Math.floor(remainder / SB);
                if (sbCount > 0) { parts.push(sbCount + " Shulker Boxes"); remainder %= SB; }
            }
            if (currentUnit === 'dc' || currentUnit === 'sb' || currentUnit === 'stack') {
                const stCount = Math.floor(remainder / ST);
                if (stCount > 0) { parts.push(stCount + " Stacks"); remainder %= ST; }
            }
            if (remainder > 0 || parts.length === 0) { parts.push(remainder); }
            
            const breakdown = parts.join(" + ");
            if (breakdown === totalStr) return totalStr;
            return `${totalStr} <span class="unit-breakdown">(${breakdown})</span>`;
        }

        function formatStackString(amount) {
            return formatAmount(amount);
        }
        
        function joinIngredients(list) {
            if (list.length === 0) return "";
            if (list.length === 1) return list[0];
            const last = list.pop();
            return list.join(", ") + " and " + last;
        }

        function formatInstructionItem(amount, key) {
            const name = getItemDisplayName(key);
            let imgTag = '';
            if (pathMap[key]) {
                imgTag = `<img src="${pathMap[key]}" class="inline-icon" alt="${name}">`;

            return `<span class="instruction-item">${formatAmount(amount, key)} ${name} ${imgTag}</span>`;
        }

        function getItemDisplayName(key) {
            const item = itemsMap[key];
            if (item && item.displayName) return item.displayName;
            return key.replace('minecraft:', '').replace(/_/g, ' ').replace(/\b\w/g, l=>l.toUpperCase());
        }

        let currentMaterialKeys = [];
        let currentStepKeys = [];

        function handleQuantityChange(key, value, btnElement) {

        function toggleDone(key, type, element) {
            const set = (type === 'material') ? doneMaterials : doneSteps;
            if (set.has(key)) {
                set.delete(key);
                element.classList.remove('done');
            } else {
                set.add(key);
                element.classList.add('done');
            }

        }

        function recalculateAll() {
            const list = document.getElementById('material-list');
            const stepContainer = document.getElementById('instructions-list');
            
            if (Object.keys(selectedItems).length === 0) {
                list.innerHTML = `<li style="grid-column: 1/-1; background:none; border:none; text-align:center; color:#666;">Select items above.</li>`;
                stepContainer.innerHTML = `<div style="text-align:center; color:#666; padding:20px;">No steps required.</div>`;
                document.getElementById('raw-count').textContent = "(0)";
                document.getElementById('steps-count').textContent = "(0)";
                currentMaterialKeys = [];
                currentStepKeys = [];
                return;
            }

            // --- AGGREGATION USING BUCKETS (Topological Sort) ---
            let grandTotals = {}; // Results (Leaf Nodes)
            let grandSteps = {};  // Crafting Steps (Intermediate)
            
            // 1. Initialize Buckets with User Input
            let buckets = []; 
            
            for (const [key, qty] of Object.entries(selectedItems)) {
                const d = itemDepth[key] || 0;
                if (!buckets[d]) buckets[d] = {};
                
                if (!buckets[d][key]) buckets[d][key] = { amount: 0, parents: new Set() };
                buckets[d][key].amount += qty;
                buckets[d][key].parents.add("Direct Input");
            }
            
            // 2. Process from Max Depth down to 0
            for (let d = buckets.length - 1; d >= 0; d--) {
                if (!buckets[d]) continue;
                
                for (const [itemName, data] of Object.entries(buckets[d])) {
                    const quantity = data.amount;
                    const item = itemsMap[itemName];
                    
                    // Stop Condition (Leaf Node)
                    if (!item || item.natural || !item.hasRecipe || itemName.startsWith('#') || itemName === 'fuel') {
                        if (!grandTotals[itemName]) grandTotals[itemName] = { amount: 0, parents: new Set() };
                        grandTotals[itemName].amount += quantity;
                        data.parents.forEach(p => grandTotals[itemName].parents.add(p));
                        continue; 
                    }
                    
                    // Otherwise, it's a Crafting Step
                    const outputCount = item.count || 1;
                    const craftsNeeded = Math.ceil(quantity / outputCount);
                    
                    if (!grandSteps[itemName]) grandSteps[itemName] = { amount: 0, method: item.recipeType };
                    grandSteps[itemName].amount += (craftsNeeded * outputCount);
                    
                    // Decompose into ingredients
                    const currentDisplayName = item.displayName || itemName;
                    
                    if (item.ingredients) {
                        const ingredientCounts = {};
                        item.ingredients.forEach(ing => { ingredientCounts[ing] = (ingredientCounts[ing] || 0) + 1; });
                        
                        for (const [ingName, countPerCraft] of Object.entries(ingredientCounts)) {
                            let totalIngNeeded = countPerCraft * craftsNeeded;
                            
                            // Fuel Check (1:1)
                            if (ingName === 'fuel') totalIngNeeded = craftsNeeded;
                            
                            let ingDepth = 0;
                            if (ingName !== 'fuel') ingDepth = itemDepth[ingName] || 0;
                            
                            if (!buckets[ingDepth]) buckets[ingDepth] = {};
                            if (!buckets[ingDepth][ingName]) buckets[ingDepth][ingName] = { amount: 0, parents: new Set() };
                            
                            buckets[ingDepth][ingName].amount += totalIngNeeded;
                            buckets[ingDepth][ingName].parents.add(currentDisplayName);
                        }
                    }
                }
            }

            // --- Render Raw Materials ---
            list.innerHTML = "";
            currentMaterialKeys = Object.keys(grandTotals).sort((a,b) => sortItems(a, b, grandTotals, doneMaterials, rawSortOrder));
            document.getElementById('raw-count').textContent = `(${currentMaterialKeys.length})`;
            
            currentMaterialKeys.forEach(k => {
                const data = grandTotals[k];
                const amt = Math.ceil(data.amount);
                const parentsList = Array.from(data.parents).sort().join(", ");
                
                let dName = getItemDisplayName(k);
                
                const li = document.createElement('li');
                li.className = 'result-card';
                if(k==='fuel') li.style.borderLeftColor = '#e67e22';
                
                const isDone = doneMaterials.has(k);
                if (isDone) li.classList.add('done');
                li.onclick = () => toggleDone(k, 'material', li);
                
                // Add Data Key for Selection Logic
                li.dataset.key = k;
                
                let iconHtml = '';
                if(pathMap[k]) iconHtml = `<img class="result-icon" src="${pathMap[k]}">`;
                else if(k === 'fuel') iconHtml = pathMap['minecraft:coal'] ? `<img class="result-icon" src="${pathMap['minecraft:coal']}">` : '';

                li.innerHTML = `
                    <div class="item-info">
                        ${iconHtml}
                        <div style="display:flex; flex-direction:column; overflow:hidden;">
                            <span class="item-name" title="${dName}">${dName}</span>
                            <span class="debug-source">Used in: ${parentsList}</span>
                        </div>
                    </div>
                    <span class="item-qty">${formatAmount(amt, k)}</span>
                    <div class="check-indicator"></div>
                `;
                list.appendChild(li);
            });

            // --- Render Instructions ---
            stepContainer.innerHTML = "";
            currentStepKeys = Object.keys(grandSteps);
            document.getElementById('steps-count').textContent = `(${currentStepKeys.length})`;

            if (currentStepKeys.length === 0) {
                 stepContainer.innerHTML = `<div style="text-align:center; color:#666; padding:20px;">No crafting steps.</div>`;
            } else {
                const grouped = {};
                for (const [key, data] of Object.entries(grandSteps)) {
                    let method = normalizeMethod(data.method);
                    if (!grouped[method]) grouped[method] = [];
                    grouped[method].push({ key, amount: data.amount });
                }

                // Updated Category Order
                const methodOrder = ["Crafting Table", "Furnace / Smelter", "Stonecutter", "Interaction", "Water Interaction", "Other"];
                
                // --- CATEGORY SORTING LOGIC ---
                // If sorting by Smart, sort categories by min depth
                let sortedMethods = methodOrder.filter(m => grouped[m]);
                // Add any missing groups that might be "Other" or custom
                Object.keys(grouped).forEach(m => { if (!sortedMethods.includes(m)) sortedMethods.push(m); });

                if (stepSortOrder === 'smart') {
                    sortedMethods.sort((a, b) => {
                        // Calculate min depth for items in group A
                        let depthA = Infinity;
                        grouped[a].forEach(i => {
                            let d = itemDepth[i.key] || 0;
                            if (d < depthA) depthA = d;
                        });
                        
                        // Calculate min depth for items in group B
                        let depthB = Infinity;
                        grouped[b].forEach(i => {
                             let d = itemDepth[i.key] || 0;
                             if (d < depthB) depthB = d;
                        });

                        if (depthA !== depthB) return depthA - depthB;
                        // Fallback to max depth if mins match
                        let maxDepthA = -1; grouped[a].forEach(i => { let d = itemDepth[i.key] || 0; if (d > maxDepthA) maxDepthA = d; });
                        let maxDepthB = -1; grouped[b].forEach(i => { let d = itemDepth[i.key] || 0; if (d > maxDepthB) maxDepthB = d; });
                        if(maxDepthA !== maxDepthB) return maxDepthA - maxDepthB;
                        
                        return a.localeCompare(b);
                    });
                }
                
                sortedMethods.forEach(method => {
                    if (grouped[method]) {
                        // Category Container
                        const catBlock = document.createElement('div');
                        const blockId = `cat-block-${method.replace(/\s+/g, '-')}`;
                        catBlock.id = blockId;
                        catBlock.className = 'category-block';
                        if (collapsedSections.has(blockId)) catBlock.classList.add('collapsed');

                        let groupTotal = 0;
                        grouped[method].forEach(i => {
                            // DYNAMIC TOTAL: Only sum up remaining items
                            if(!doneSteps.has(i.key)) {
                                groupTotal += Math.ceil(i.amount);
                            }
                        });
                        
                        const allDone = grouped[method].every(i => doneSteps.has(i.key));

                        catBlock.innerHTML = `
                            <div class="category-header" onclick="toggleCategory('${blockId}', event)">
                                <button class="collapse-btn">▼</button>
                                <span class="category-title">${method}</span>
                                <span class="header-line"></span>
                                <span class="group-total">Total: ${formatAmount(groupTotal, 'total')}</span>
                                <label class="select-all-container" style="margin-left: 15px;" onclick="event.stopPropagation()">
                                    <input type="checkbox" onchange="toggleSelectAllCategory('${method}', this)" ${allDone ? 'checked' : ''}>
                                    <span class="custom-check"></span>
                                </label>
                            </div>
                        `;

                        const content = document.createElement('div');
                        // Use Dynamic Grid Class
                        content.className = `category-content steps-grid cols-${stepsGridColumns}`;
                        
                        const dummyAmounts = {};
                        grouped[method].forEach(g => dummyAmounts[g.key] = { amount: g.amount });
                        grouped[method].sort((a,b) => sortItems(a.key, b.key, dummyAmounts, doneSteps, stepSortOrder));
                        
                        grouped[method].forEach(step => {
                            const li = document.createElement('div');
                            li.className = 'result-card';
                            
                            const isDone = doneSteps.has(step.key);
                            if (isDone) li.classList.add('done');
                            li.onclick = () => toggleDone(step.key, 'step', li);
                            
                            // Add Data Key
                            li.dataset.key = step.key;
                            
                            const totalAmount = Math.ceil(step.amount);
                            const itemData = itemsMap[step.key];
                            
                            let instructionText = "";
                            
                            if (step.key === "minecraft:carved_pumpkin") {
                                instructionText = `Right click on ${formatInstructionItem(totalAmount, 'minecraft:pumpkin')} with Shears to carve it into ${formatInstructionItem(totalAmount, 'minecraft:carved_pumpkin')}`;
                            } else if (["minecraft:water_bucket", "minecraft:lava_bucket", "minecraft:powder_snow_bucket", "minecraft:milk_bucket"].includes(step.key)) {
                                instructionText = `Right click while holding a bucket to turn ${formatInstructionItem(totalAmount, 'minecraft:bucket')} into ${formatInstructionItem(totalAmount, step.key)}`;
                            } else {
                                const crafts = Math.ceil(totalAmount / (itemData.count || 1));
                                const inputs = [];
                                
                                const ingCounts = {};
                                if (itemData.ingredients) {
                                    itemData.ingredients.forEach(i => ingCounts[i] = (ingCounts[i] || 0) + 1);
                                }
                                
                                for(let [ingKey, perCraft] of Object.entries(ingCounts)) {
                                    if(ingKey === 'fuel') continue; 
                                    const totalIng = perCraft * crafts;
                                    inputs.push(formatInstructionItem(totalIng, ingKey));
                                }
                                
                                const inputStr = joinIngredients(inputs);
                                const outputStr = formatInstructionItem(totalAmount, step.key);
                                
                                if (method === "Crafting Table") {
                                    instructionText = `Craft ${inputStr} into ${outputStr}`;
                                } else if (method === "Furnace / Smelter") {
                                    const fuel = crafts; 
                                    const fuelStr = formatInstructionItem(fuel, "Fuel");
                                    instructionText = `Use a furnace to smelt ${inputStr} into ${outputStr} using ${fuelStr}`;
                                } else if (method === "Stonecutter") {
                                    instructionText = `Use a stonecutter to cut ${inputStr} into ${outputStr}`;
                                } else if (method === "Interaction") {
                                    instructionText = `Right click on ${inputStr} with an Axe to strip it into ${outputStr}`;
                                } else if (method === "Water Interaction") {
                                    instructionText = `Pour water onto ${inputStr} to turn it into ${outputStr}`;
                                } else {
                                    instructionText = `Transform ${inputStr} into ${outputStr}`;
                                }
                            }

                            let iconHtml = '';
                            if(pathMap[step.key]) iconHtml = `<img class="result-icon" src="${pathMap[step.key]}">`;

                            // Inline ingredient icons are now injected directly into formatInstructionItem so we don't need the side cluster

                            li.innerHTML = `
                                <div class="item-info">
                                    ${iconHtml}
                                    <span class="item-name">${instructionText}</span>
                                </div>
                                <div class="check-indicator"></div>
                            `;
                            content.appendChild(li);
                        });
                        
                        catBlock.appendChild(content);
                        stepContainer.appendChild(catBlock);
                    }
                });
            }
        }

        // Updated for Tracing & Steps & Accurate Yield
        function getRawMaterials(itemName, quantity, totals = {}, steps = {}, stack = new Set(), parent = "Direct Input") {
            if (!itemName || itemName.toLowerCase().includes('unknown')) return totals;
            const item = itemsMap[itemName];
            
            if (stack.has(itemName) || !item || item.natural || !item.hasRecipe || itemName.startsWith('#') || itemName === 'fuel') {
                if (!totals[itemName]) totals[itemName] = { amount: 0, parents: new Set() };
                totals[itemName].amount += quantity;
                if (parent) totals[itemName].parents.add(parent);
                return totals;
            }
            
            stack.add(itemName);
            const outputCount = item.count || 1;
            const craftsNeeded = Math.ceil(quantity / outputCount);

            if (!steps[itemName]) steps[itemName] = { amount: 0, method: item.recipeType };
            steps[itemName].amount += (craftsNeeded * outputCount);
            
            const currentDisplayName = item.displayName || itemName.replace('minecraft:', '').replace(/_/g, ' ').replace(/\b\w/g, l=>l.toUpperCase());
            
            if (item.ingredients) {
                 const ingredientCounts = {};
                 item.ingredients.forEach(ing => { ingredientCounts[ing] = (ingredientCounts[ing] || 0) + 1; });
                 for (const [ingName, countPerCraft] of Object.entries(ingredientCounts)) {
                      let totalIngNeeded = countPerCraft * craftsNeeded;
                      if (ingName === 'fuel') totalIngNeeded = craftsNeeded;
                      getRawMaterials(ingName, totalIngNeeded, totals, steps, stack, currentDisplayName);
                 }
            }
            stack.delete(itemName);
            return totals;
        }

        // --- FILE IMPORT HANDLER (TXT & LITEMATIC) ---
        document.getElementById('litematic-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const filename = file.name.toLowerCase();

            // 1. TEXT FILE PARSER (Litematica Export)
            if (filename.endsWith('.txt')) {
                const text = await file.text();
                // Schematic Title Extraction
                const headerMatch = text.match(/\|\s*Material List for (?:placement|schematic) '([^']+)'/);
                if (headerMatch && headerMatch[1]) {
                     document.getElementById('schematic-title').textContent = "Imported: " + headerMatch[1];
                }

                const counts = parseLitematicaText(text);
                
                if (Object.keys(counts).length > 0) {
                    processBlockCounts(counts);
                    // No alert here, just success
                    showToast("Imported successfully!");
                    if (!hideUnusedMode) toggleHideUnused();
                } else {
                    showToast("Could not parse text file.", true);
                }
                
            } else if (filename.endsWith('.litematic')) {
                // 2. BINARY LITEMATIC PARSER
                try {
                    const ds = new DecompressionStream('gzip');
                    const stream = file.stream().pipeThrough(ds);
                    const buffer = await new Response(stream).arrayBuffer();
                    
                    const reader = new NBTReader(new DataView(buffer));
                    const nbt = reader.readTag(); 
                    
                    // Simple schematic name extract from Litematic NBT if available
                    // Usually under Metadata > Name
                    let schematicName = "";
                    if(nbt.value && nbt.value.Metadata && nbt.value.Metadata.value && nbt.value.Metadata.value.Name) {
                         schematicName = nbt.value.Metadata.value.Name.value;
                    }
                    if(schematicName) document.getElementById('schematic-title').textContent = "Imported: " + schematicName;

                    let materialList = findMaterialList(nbt);
                    
                    if (!materialList) {
                        const blockCounts = countBlocksFromRegions(nbt);
                        if (blockCounts && Object.keys(blockCounts).length > 0) {
                            processBlockCounts(blockCounts);
                            showToast("Imported from geometry!");
                            if (!hideUnusedMode) toggleHideUnused();
                        } else {
                            showToast("Could not read MaterialList or Region data.", true);
                        }
                    } else {
                        processMaterialList(materialList);
                        showToast("Imported from Material List!");
                        if (!hideUnusedMode) toggleHideUnused();
                    }

                } catch (err) {
                    console.error(err);
                    showToast("Error parsing .litematic: " + err.message, true);
                }
            }
            e.target.value = '';
        });

        // ... (Parsers and NBTReader code preserved) ...
        function parseLitematicaText(text) {
             const lines = text.split(/\r?\n/);
             const counts = {};
             lines.forEach(line => {
                 line = line.trim();
                 if (!line || line.startsWith('+') || line.includes('| Item') || line.includes('Material List')) return;
                 const parts = line.split('|').map(s => s.trim()).filter(s => s !== '');
                 if (parts.length >= 2) {
                     const name = parts[0];
                     const total = parseInt(parts[1].replace(/,/g, ''), 10);
                     if (name && !isNaN(total)) {
                         const itemKey = resolveDisplayNameToId(name);
                         if (itemKey) counts[itemKey] = (counts[itemKey] || 0) + total;
                     }
                 }
             });
             return counts;
        }

        function resolveDisplayNameToId(name) {
            const cleanName = name.toLowerCase();
            if (displayToKeyMap[cleanName]) return displayToKeyMap[cleanName];
            return null;
        }

        function findTagRecursively(obj, targetName) {
            if (!obj || typeof obj !== 'object') return null;
            const keys = Object.keys(obj);
            const match = keys.find(k => k.toLowerCase() === targetName.toLowerCase());
            if (match) return obj[match];
            for (const key in obj) {
                const tag = obj[key];
                if (tag && tag.type === 10 && tag.value) {
                    const found = findTagRecursively(tag.value, targetName);
                    if (found) return found;
                }
            }
            return null;
        }

        function findMaterialList(nbt) {
            try {
                if (nbt.type !== 10) return null;
                const listTag = findTagRecursively(nbt.value, 'MaterialList');
                if (listTag && listTag.type === 9) return listTag.value;
                return null;
            } catch (e) { return null; }
        }

        function countBlocksFromRegions(nbt) {
            const counts = {};
            const regions = findTagRecursively(nbt.value, 'Regions');
            if (!regions || regions.type !== 10) return null;
            for (const regionName in regions.value) {
                const region = regions.value[regionName].value;
                const paletteTag = region['BlockStatePalette'];
                if (!paletteTag || paletteTag.type !== 9) continue;
                const palette = paletteTag.value; 
                if (!Array.isArray(palette) || palette.length === 0) continue;
                const statesTag = region['BlockStates'];
                
                if (!statesTag) {
                    if (palette.length > 0 && palette[0].value['Name']) {
                         const blockId = palette[0].value['Name'].value;
                         const sizeTag = region['Size'];
                         if (sizeTag && sizeTag.value) {
                             const sizeX = Math.abs(sizeTag.value['x'].value);
                             const sizeY = Math.abs(sizeTag.value['y'].value);
                             const sizeZ = Math.abs(sizeTag.value['z'].value);
                             counts[blockId] = (counts[blockId] || 0) + (sizeX * sizeY * sizeZ);
                         }
                    }
                    continue;
                }
                const longArray = statesTag.value;
                if (!longArray || !Array.isArray(longArray)) continue;
                const paletteSize = palette.length;
                let bitsPerEntry = Math.max(2, Math.ceil(Math.log2(paletteSize)));
                bitsPerEntry = Math.floor(bitsPerEntry); 
                const sizeTag = region['Size'];
                if (!sizeTag) continue;
                const sizeX = Math.abs(sizeTag.value['x'].value);
                const sizeY = Math.abs(sizeTag.value['y'].value);
                const sizeZ = Math.abs(sizeTag.value['z'].value);
                const totalBlocks = sizeX * sizeY * sizeZ;
                const indices = unpackBlockStates(longArray, bitsPerEntry, totalBlocks);
                
                for (let i = 0; i < indices.length; i++) {
                    const idx = indices[i];
                    if (idx < palette.length && palette[idx].value['Name']) {
                        const blockId = palette[idx].value['Name'].value;
                        if (blockId !== 'minecraft:air' && blockId !== 'minecraft:cave_air' && blockId !== 'minecraft:void_air') {
                            counts[blockId] = (counts[blockId] || 0) + 1;
                        }
                    }
                }
            }
            return counts;
        }

        function unpackBlockStates(longs, bitsPerEntry, limit) {
             if (Number.isNaN(bitsPerEntry) || bitsPerEntry <= 0) return [];
             if (!Array.isArray(longs)) return [];
             const indices = [];
             const unsignedLongs = longs.map(l => {
                 try { return BigInt.asUintN(64, BigInt(l)); } 
                 catch (e) { return 0n; }
             });
             const mask = (1n << BigInt(bitsPerEntry)) - 1n;
             const entriesPerLong = Math.floor(64 / bitsPerEntry);
             for (let i = 0; i < unsignedLongs.length; i++) {
                 let currentLong = unsignedLongs[i];
                 for (let j = 0; j < entriesPerLong; j++) {
                     if (indices.length >= limit) return indices;
                     const val = currentLong & mask;
                     indices.push(Number(val));
                     currentLong >>= BigInt(bitsPerEntry);
                 }
             }
             return indices;
        }

        function processMaterialList(list) {
            list.forEach(entry => {
                const nameTag = entry.value['Name'];
                const countTag = entry.value['Amount'];
                if(nameTag && countTag) {
                    addCount(nameTag.value, countTag.value);
                }
            });
            recalculateAll();
            applyFilters();
        }
        
        function processBlockCounts(counts) {
            for (const [name, count] of Object.entries(counts)) {
                addCount(name, count);
            }
            recalculateAll();
            applyFilters();
        }
        
        function addCount(name, count) {
            const itemKey = resolveBlockToItem(name);
            if (itemKey && itemsMap[itemKey]) {
                selectedItems[itemKey] = (selectedItems[itemKey] || 0) + count;
                const btn = document.getElementById(`btn-${itemKey}`);
                if (btn) {
                    btn.classList.add('active');
                    btn.querySelector('input').value = selectedItems[itemKey];
                }
            }
        }

        function resolveBlockToItem(blockName) {
            if (itemsMap[blockName]) return blockName;
            let clean = blockName.replace('minecraft:', '');
            if (clean.startsWith('wall_')) {
                const base = "minecraft:" + clean.replace('wall_', '');
                if (itemsMap[base]) return base;
            }
            if (clean.startsWith('potted_')) {
                const base = "minecraft:" + clean.replace('potted_', '');
                if (itemsMap[base]) return base;
            }
            if (clean.endsWith('_block')) {
                const base = "minecraft:" + clean.replace('_block', '');
                if (itemsMap[base]) return base;
            }
            if (clean.endsWith('cauldron')) return "minecraft:cauldron";
            if (clean === 'water' || clean === 'flowing_water') return "minecraft:water_bucket";
            if (clean === 'lava' || clean === 'flowing_lava') return "minecraft:lava_bucket";
            const rePrefixed = "minecraft:" + clean;
            if (itemsMap[rePrefixed]) return rePrefixed;
            return null;
        }

        class NBTReader {
            constructor(view) { this.view = view; this.offset = 0; }
            readTag() {
                const type = this.readByte();
                if (type === 0) return null;
                const name = this.readString();
                const value = this.readPayload(type);
                return { type, name, value };
            }
            readPayload(type) {
                switch (type) {
                    case 1: return this.readByte();
                    case 2: return this.readShort();
                    case 3: return this.readInt();
                    case 4: return this.readLong();
                    case 5: return this.readFloat();
                    case 6: return this.readDouble();
                    case 7: return this.readByteArray();
                    case 8: return this.readString();
                    case 9: return this.readList();
                    case 10: return this.readCompound();
                    case 11: return this.readIntArray();
                    case 12: return this.readLongArray();
                    default: throw new Error("Unknown Tag Type: " + type);
                }
            }
            readByte() { const v = this.view.getInt8(this.offset); this.offset += 1; return v; }
            readShort() { const v = this.view.getInt16(this.offset); this.offset += 2; return v; }
            readInt() { const v = this.view.getInt32(this.offset); this.offset += 4; return v; }
            readLong() { 
                const high = this.view.getInt32(this.offset); 
                const low = this.view.getInt32(this.offset + 4); 
                this.offset += 8; 
                if (DataView.prototype.getBigInt64) return this.view.getBigInt64(this.offset - 8);
                return BigInt(high) << 32n | BigInt(low >>> 0); 
            }
            readFloat() { const v = this.view.getFloat32(this.offset); this.offset += 4; return v; }
            readDouble() { const v = this.view.getFloat64(this.offset); this.offset += 8; return v; }
            readByteArray() {
                const len = this.readInt();
                const arr = [];
                for(let i=0; i<len; i++) arr.push(this.readByte());
                return arr;
            }
            readString() {
                const len = this.view.getUint16(this.offset);
                this.offset += 2;
                const strBytes = new Uint8Array(this.view.buffer, this.view.byteOffset + this.offset, len);
                this.offset += len;
                return new TextDecoder().decode(strBytes);
            }
            readList() {
                const type = this.readByte();
                const len = this.readInt();
                const arr = [];
                for(let i=0; i<len; i++) arr.push({ type, value: this.readPayload(type) });
                return { type, value: arr }; 
            }
            readCompound() {
                const obj = {};
                while(true) {
                    const type = this.readByte();
                    if (type === 0) break;
                    const name = this.readString();
                    obj[name] = { type, value: this.readPayload(type) };
                }
                return obj;
            }
            readIntArray() {
                const len = this.readInt();
                const arr = [];
                for(let i=0; i<len; i++) arr.push(this.readInt());
                return arr;
            }
            readLongArray() {
                const len = this.readInt();
                const arr = [];
                for(let i=0; i<len; i++) arr.push(this.readLong());
                return arr;
            }
        }

        if (itemsArray.length > 0) init();
    </script>
